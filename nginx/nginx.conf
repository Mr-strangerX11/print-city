worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Security headers (global) ─────────────────────────────────────────────
  add_header X-Frame-Options             "SAMEORIGIN"            always;
  add_header X-Content-Type-Options      "nosniff"               always;
  add_header X-XSS-Protection           "1; mode=block"          always;
  add_header Referrer-Policy            "strict-origin"          always;
  add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

  # Hide server version
  server_tokens off;
  more_clear_headers Server;

  # ─── Rate limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_zone:20m    rate=60r/m;
  limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=print_zone:10m  rate=5r/m;

  # ─── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile       on;
  tcp_nopush     on;
  tcp_nodelay    on;
  keepalive_timeout 65;
  client_max_body_size 60M;  # Allow up to 60MB design uploads

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # ─── Upstream ──────────────────────────────────────────────────────────────
  upstream api_backend {
    server api:4000;
    keepalive 64;
  }

  upstream web_frontend {
    server web:3000;
    keepalive 32;
  }

  # ─── Main server ───────────────────────────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect HTTP → HTTPS in production (uncomment):
    # return 301 https://$host$request_uri;

    # ─── Design upload endpoint (stricter rate limit + larger body) ──────────
    location /api/designs/upload {
      limit_req zone=upload_zone burst=3 nodelay;
      client_max_body_size 60M;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;

      # BLOCK direct file access — no Cache on design routes
      add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
    }

    # ─── Print stream endpoint (strict: 5/min, no caching, no buffering) ────
    location /api/print-secure/stream/ {
      limit_req zone=print_zone burst=2 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;

      # No caching, no buffering for print stream
      proxy_buffering    off;
      add_header Cache-Control "no-store, no-cache, private" always;
      add_header X-Robots-Tag "noindex, nofollow" always;

      # Prevent embedding outside print iframe
      add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # ─── Design render endpoint (one-time tokens, no cache) ─────────────────
    location /api/designs/render {
      limit_req zone=api_zone burst=5 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

      add_header Cache-Control "no-store, private" always;
    }

    # ─── General API ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_zone burst=20 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 30s;
    }

    # ─── Frontend ────────────────────────────────────────────────────────────
    location / {
      proxy_pass         http://web_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ─── Block all direct storage / file access ───────────────────────────────
    location ~* \.(env|key|pem|p12|pfx|sql|bak|log)$ {
      deny all;
      return 404;
    }
  }
}
